server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: ${DB_username}
    password: ${DB_password}
    hikari:
      pool-name: LibraryHikariPool
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 2000
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
       hibernate:

Logging:
  level:
    org.springframwork.security: DEBUG
security:
  jwt:
    secret: ${MY_SECRET_KEY}
    issuer: ${ISSUER}
    access_ttl: ${ACCESS_TTL:900000}       #  15 min
    refresh_ttl: ${REFRESH_TTL:604800000}  # 7 days
    refresh_token_cookie_name: ${REFRESH_COOKIE:refresh_token}
    cookie_secure: ${COOKIE_SECURE:true}
    cookie_http_only: ${COOKIE_HTTP_ONLY:true}
    cookie_same_site: ${COOKIE_SAME_SITE:Strict}


